name: chatapp
description: "ChatApp — барномаи паёмрасон бо Flutter, Firebase ва AI Assistant."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.12.0'

dependencies:
  flutter:
    sdk: flutter

  # Иконкаҳои услуби iOS (стандартан бо flutter create меояд)
  cupertino_icons: ^1.0.8

  # Firebase — асоси backend (Auth + Cloud Firestore)
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
